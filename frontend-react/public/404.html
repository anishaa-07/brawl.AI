<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // This redirects GitHub Pages 404s back to our HashRouter format!
      // Example: /brawl.AI/login -> /brawl.AI/#/login
      var l = window.location;
      var basePath = '/brawl.AI/';
      
      if (l.pathname.startsWith(basePath) && l.pathname !== basePath) {
        var newPath = l.pathname.replace(basePath, '');
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + basePath + '#/' + newPath + l.search + l.hash);
      } else {
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + basePath);
      }
    </script>
  </head>
  <body>
  </body>
</html>
